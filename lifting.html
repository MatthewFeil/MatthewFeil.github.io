---
layout: page
title: Lifting Tracker
permalink: /lifting/
extra_css:
  - /assets/css/lifting.css
---

<section
  class="lifting-app"
  data-api-url="https://ofrbbmkbbtohocgifwly.functions.supabase.co/lifting-api"
  data-personal-url="{{ "/personal/" | relative_url }}"
>
  <div class="lifting-workspace" id="lifting-workspace" hidden>
    <div class="lifting-toolbar">
      <div>
        <p class="lifting-kicker">Personal max tracker</p>
        <h2>Lift progress</h2>
      </div>
      <div class="lifting-toolbar-actions">
        <button id="log-set-open" class="lifting-secondary" type="button">Log set</button>
        <button id="add-lift-open" class="lifting-secondary" type="button">Add lift</button>
        <button id="lifting-lock-button" class="lifting-secondary" type="button">Lock</button>
      </div>
    </div>

    <div class="lifting-filter">
      <label for="lift-search">Search lifts</label>
      <input id="lift-search" type="search" placeholder="Bench, squat, deadlift...">
    </div>

    <div class="lifting-list" id="lifting-list"></div>

    <p id="lifting-status" class="lifting-status" role="status"></p>
  </div>

  <dialog class="lifting-modal" id="add-lift-modal">
    <form id="add-lift-form" class="lifting-form" method="dialog">
      <div class="lifting-modal-head">
        <h3>Add lift type</h3>
        <button id="add-lift-close" class="lifting-icon-button" type="button" aria-label="Close">&times;</button>
      </div>
      <label for="lift-name">Lift name</label>
      <input id="lift-name" name="name" type="text" placeholder="Incline bench press" required>
      <button type="submit">Create lift</button>
    </form>
  </dialog>

  <dialog class="lifting-modal lifting-log-modal" id="log-set-modal">
    <form id="log-form" class="lifting-form" method="dialog">
      <div class="lifting-modal-head">
        <h3>Log a set</h3>
        <button id="log-set-close" class="lifting-icon-button" type="button" aria-label="Close">&times;</button>
      </div>
      <label for="log-lift-search">Find lift</label>
      <input id="log-lift-search" type="search" placeholder="Bench, squat, deadlift..." autocomplete="off">
      <label for="log-lift">Lift</label>
      <select id="log-lift" name="lift_id" required></select>
      <p class="lifting-select-status" id="log-lift-search-status" role="status"></p>
      <label for="log-weight">Weight</label>
      <input id="log-weight" name="weight" type="number" min="0" step="0.5" placeholder="225" required>
      <label for="log-reps">Reps</label>
      <input id="log-reps" name="reps" type="number" min="1" max="10" step="1" placeholder="5" required>
      <label for="log-date">Date</label>
      <input id="log-date" name="lifted_at" type="date" required>
      <label for="log-notes">Notes</label>
      <input id="log-notes" name="notes" type="text" placeholder="Optional">
      <button type="submit">Add log</button>
    </form>
  </dialog>

  <dialog class="lifting-modal" id="rename-lift-modal">
    <form id="rename-lift-form" class="lifting-form" method="dialog">
      <div class="lifting-modal-head">
        <h3>Rename lift</h3>
        <button id="rename-lift-close" class="lifting-icon-button" type="button" aria-label="Close">&times;</button>
      </div>
      <input id="rename-lift-id" name="id" type="hidden">
      <label for="rename-lift-name">Lift name</label>
      <input id="rename-lift-name" name="name" type="text" required>
      <button type="submit">Save name</button>
    </form>
  </dialog>

  <dialog class="lifting-modal lifting-logs-modal" id="lift-logs-modal">
    <div class="lifting-modal-head">
      <h3 id="lift-logs-title">Logs</h3>
      <div class="lifting-modal-head-actions">
        <button class="lifting-action" id="lift-logs-delete" type="button">Delete lift</button>
        <button id="lift-logs-close" class="lifting-icon-button" type="button" aria-label="Close">&times;</button>
      </div>
    </div>
    <div id="lift-logs-content"></div>
  </dialog>
</section>

<script src="{{ "/assets/js/lifting.js" | relative_url }}" defer></script>
